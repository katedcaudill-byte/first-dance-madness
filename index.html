<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Dance Madness</title>

<style>
body{
  background:#0f0f12;
  color:#ffffff;
  font-family:Arial, Helvetica, sans-serif;
  margin:0;
  padding:30px;
}

h1{
  text-align:center;
  color:#b04a86;
  letter-spacing:4px;
}

.subtitle{
  text-align:center;
  margin-bottom:30px;
}

.name-box{
  max-width:500px;
  margin:0 auto 30px auto;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #b04a86;
  background:#18181d;
  color:white;
  box-sizing:border-box;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:#18181d;
  border:1px solid #b04a86;
  border-radius:12px;
  padding:20px;
}

.card h3{
  color:#d68ab8;
  margin-top:0;
}

.song-btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#b04a86;
  color:white;
  cursor:pointer;
  font-size:15px;
}

.song-btn:hover{
  opacity:.9;
}

.selected{
  background:#6f284f !important;
}

#results{
  max-width:700px;
  margin:40px auto;
  border:1px solid #b04a86;
  border-radius:12px;
  padding:20px;
}

#submitBtn{
  display:none;
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#b04a86;
  color:white;
  cursor:pointer;
  font-size:16px;
}

#submitBtn:disabled{
  opacity:.5;
}

.success{
  color:#8fd48f;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>FIRST DANCE MADNESS</h1>

<p class="subtitle">
Help us choose our first dance song 💜
</p>

<div class="name-box">
<input id="guestName" type="text" placeholder="Your Name">
</div>

<div class="grid">

<div class="card">
<h3>Matchup 1</h3>
<button class="song-btn" onclick="selectSong(1,'Universal Sound',this)">Universal Sound</button>
<button class="song-btn" onclick="selectSong(1,'All Yourn',this)">All Your'n</button>
</div>

<div class="card">
<h3>Matchup 2</h3>
<button class="song-btn" onclick="selectSong(2,'Every Little Kiss',this)">Every Little Kiss</button>
<button class="song-btn" onclick="selectSong(2,'Every Girl',this)">Every Girl</button>
</div>

<div class="card">
<h3>Matchup 3</h3>
<button class="song-btn" onclick="selectSong(3,'Tougher Than the Rest',this)">Tougher Than the Rest</button>
<button class="song-btn" onclick="selectSong(3,'Im on Fire',this)">I'm on Fire</button>
</div>

<div class="card">
<h3>Matchup 4</h3>
<button class="song-btn" onclick="selectSong(4,'The Book of Love',this)">The Book of Love</button>
<button class="song-btn" onclick="selectSong(4,'Make You Feel My Love',this)">Make You Feel My Love</button>
</div>

</div>

<div id="results">
<h2>Your Picks</h2>
<ol id="pickList"></ol>

<button id="submitBtn" onclick="submitVotes()">
Submit Votes
</button>

<div id="message"></div>
</div>

<script>

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbzUWpgiIokobHZW8WFfHmv7bRejcW4Gf5cgwbn7Rvvmi81bJXyHnOvUMeG-PibfI1z_6w/exec";
  
const selections = {
  matchup1:"",
  matchup2:"",
  matchup3:"",
  matchup4:""
};

function selectSong(matchup,song,button){

  const card = button.parentElement;

  card.querySelectorAll(".song-btn")
      .forEach(btn => btn.classList.remove("selected"));

  button.classList.add("selected");

  selections["matchup"+matchup] = song;

  updateDisplay();
}

function updateDisplay(){

  const list = document.getElementById("pickList");
  list.innerHTML = "";

  Object.values(selections).forEach(song => {

    if(song){
      const li = document.createElement("li");
      li.textContent = song;
      list.appendChild(li);
    }

  });

  const complete =
    selections.matchup1 &&
    selections.matchup2 &&
    selections.matchup3 &&
    selections.matchup4;

  document.getElementById("submitBtn").style.display =
    complete ? "block" : "none";
}

function submitVotes(){

  const name =
    document.getElementById("guestName").value.trim();

  if(!name){
    alert("Please enter your name.");
    return;
  }

  document.getElementById("submitBtn").disabled = true;

  fetch(WEBAPP_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name:name,
      matchup1:selections.matchup1,
      matchup2:selections.matchup2,
      matchup3:selections.matchup3,
      matchup4:selections.matchup4
    })
  })
  .then(() => {

    document.getElementById("message").innerHTML =
      '<p class="success">Thank you for voting!</p>';

  })
  .catch(error => {

    console.error(error);

    document.getElementById("submitBtn").disabled = false;

    alert("Vote could not be submitted.");

  });
}

</script>

</body>
</html>

</script>

</body>
</html>
